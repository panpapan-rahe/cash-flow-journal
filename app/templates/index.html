<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <h1>Cashflow</h1>
        </div>
        <div class="topbar-right">
            <span class="user-badge">{{ username }}</span>
            <a href="/logout" class="btn btn-sm btn-outline">Keluar</a>
        </div>
    </header>

    <main class="container">
        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card card-income">
                <div class="card-label">Pemasukan</div>
                <div class="card-value" id="summary-income">Rp 0</div>
            </div>
            <div class="card card-expense">
                <div class="card-label">Pengeluaran</div>
                <div class="card-value" id="summary-expense">Rp 0</div>
            </div>
            <div class="card card-balance">
                <div class="card-label">Saldo</div>
                <div class="card-value" id="summary-balance">Rp 0</div>
            </div>
            <div class="card card-debt">
                <div class="card-label">Hutang Aktif</div>
                <div class="card-value" id="summary-debt">Rp 0</div>
            </div>
        </section>

        <!-- Form Input -->
        <section class="card form-section">
            <h2>Transaksi Baru</h2>
            <form id="transaction-form" class="form-inline">
                <div class="form-group">
                    <label for="tx-type">Tipe</label>
                    <select id="tx-type" required>
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                        <option value="transfer">Mutasi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tx-amount">Nominal</label>
                    <input type="number" id="tx-amount" min="1" step="any" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="tx-category">Kategori</label>
                    <input type="text" id="tx-category" placeholder="contoh: Gaji, Makanan" list="category-list">
                    <datalist id="category-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="tx-account">Akun</label>
                    <input type="text" id="tx-account" value="Utama" placeholder="Nama akun" list="account-list">
                    <datalist id="account-list"></datalist>
                </div>
                <div class="form-group" id="to-account-group" style="display:none">
                    <label for="tx-to-account">Ke Akun</label>
                    <input type="text" id="tx-to-account" placeholder="Akun tujuan" list="account-list">
                </div>
                <div class="form-group">
                    <label for="tx-date">Tanggal</label>
                    <input type="date" id="tx-date" required>
                </div>
                <div class="form-group">
                    <label for="tx-desc">Keterangan</label>
                    <input type="text" id="tx-desc" placeholder="Opsional">
                </div>
                <button type="submit" class="btn btn-primary">Simpan</button>
            </form>
        </section>

        <!-- Transactions Table -->
        <section class="card">
            <div class="section-header">
                <h2>Transaksi Terbaru</h2>
                <div class="filter-group">
                    <button class="btn btn-sm btn-filter active" data-filter="all">Semua</button>
                    <button class="btn btn-sm btn-filter" data-filter="income">Masuk</button>
                    <button class="btn btn-sm btn-filter" data-filter="expense">Keluar</button>
                    <button class="btn btn-sm btn-filter" data-filter="transfer">Mutasi</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table" id="transactions-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Tipe</th>
                            <th>Kategori</th>
                            <th>Akun</th>
                            <th>Nominal</th>
                            <th>Keterangan</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr><td colspan="7" class="empty-state">Belum ada transaksi</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Debts Section -->
        <section class="card">
            <div class="section-header">
                <h2>Hutang</h2>
                <button class="btn btn-sm btn-primary" id="btn-add-debt">+ Tambah Hutang</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table" id="debts-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Total</th>
                            <th>Dibayar</th>
                            <th>Sisa</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="debts-body">
                        <tr><td colspan="6" class="empty-state">Belum ada hutang</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal: Add Debt -->
    <div class="modal-overlay" id="debt-modal" style="display:none">
        <div class="modal">
            <h3>Tambah Hutang</h3>
            <form id="debt-form">
                <div class="form-group">
                    <label>Nama Pihutang</label>
                    <input type="text" id="debt-name" required>
                </div>
                <div class="form-group">
                    <label>Total Pinjaman</label>
                    <input type="number" id="debt-amount" min="1" step="any" required>
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <input type="text" id="debt-desc" placeholder="Opsional">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeDebtModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Pay Debt -->
    <div class="modal-overlay" id="pay-modal" style="display:none">
        <div class="modal">
            <h3>Bayar Hutang</h3>
            <form id="pay-form">
                <input type="hidden" id="pay-debt-id">
                <div class="form-group">
                    <label>Jumlah Bayar</label>
                    <input type="number" id="pay-amount" min="1" step="any" required>
                </div>
                <div class="form-group">
                    <label>Catatan</label>
                    <input type="text" id="pay-note" placeholder="Opsional">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closePayModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Bayar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
