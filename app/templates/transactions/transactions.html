<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow - Transaksi</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-size='72' text-anchor='middle'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#fffbf5', 100: '#fff3e0', 200: '#ffe0b2', 300: '#ffcc80',
                            400: '#ffa726', 500: '#ff9800', 600: '#f57c00', 700: '#e65100',
                        },
                        cream: '#fffbf5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scroll-thin::-webkit-scrollbar-thumb { background: #ffe0b2; border-radius: 3px; }
        .nav-item { transition: background-color 0.15s, color: 0.15s; }
        .modal-overlay { animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input:focus, select:focus, textarea:focus {
            outline: none; box-shadow: 0 0 0 2px #ffe0b2; border-color: #ff9800 !important;
        }
    </style>
</head>
<body class="bg-cream font-sans text-gray-800">

<div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ── -->
    {% include 'layout/_sidebar.html' %}

    <!-- ── Main ── -->
    <main class="flex-1 overflow-y-auto scroll-thin p-5 lg:p-7 bg-cream">

        <header class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-lg font-bold text-gray-800">Tambah Transaksi</h2>
                <p class="text-xs text-gray-400">Catat pemasukan, pengeluaran, atau mutasi</p>
            </div>
        </header>

        <!-- Accounts Grid -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="accounts-grid">
            <div class="bg-white rounded-xl p-4 border border-warm-100 col-span-full text-center text-sm text-gray-400">Belum ada rekening. Buka <strong>Pengaturan</strong> untuk menambah.</div>
        </div>

        <!-- Transaction Form -->
        <div class="bg-white rounded-xl p-5 border border-warm-100 mb-6">
            <form id="transaction-form" class="space-y-3">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Tanggal</label>
                        <input type="date" id="tx-date" required class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Tipe</label>
                        <select id="tx-type" required class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                            <option value="income">Pemasukan</option>
                            <option value="expense">Pengeluaran</option>
                            <option value="transfer">Mutasi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Kategori</label>
                        <select id="tx-category" required class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                            <option value="">-- Pilih Kategori --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Akun</label>
                        <select id="tx-account" required class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50"></select>
                    </div>
                </div>
                <div id="to-account-group" style="display:none">
                    <label class="block text-sm text-gray-500 mb-1">Ke Akun</label>
                    <select id="tx-to-account" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 lg:max-w-[240px]"></select>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Nominal</label>
                        <input type="number" id="tx-amount" min="1" step="any" required placeholder="0" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Admin</label>
                        <input type="number" id="tx-admin" min="0" step="any" placeholder="0" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-500 mb-1">Keterangan</label>
                        <input type="text" id="tx-desc" placeholder="Opsional" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50">
                    </div>
                </div>
                <button type="submit" class="w-full lg:w-auto px-6 py-2.5 text-sm font-semibold bg-warm-500 hover:bg-warm-600 text-white rounded-lg transition">Simpan</button>
            </form>
        </div>

        <!-- Transactions Table -->
        <div class="bg-white rounded-xl p-6 border border-warm-100">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base font-semibold text-gray-700">Riwayat Transaksi</h3>
                <div class="flex gap-1">
                    <button class="btn-filter px-3 py-1 text-xs font-medium rounded-md bg-warm-500 text-white" data-filter="all">Semua</button>
                    <button class="btn-filter px-3 py-1 text-xs font-medium rounded-md bg-gray-100 text-gray-500 hover:bg-warm-100" data-filter="income">Masuk</button>
                    <button class="btn-filter px-3 py-1 text-xs font-medium rounded-md bg-gray-100 text-gray-500 hover:bg-warm-100" data-filter="expense">Keluar</button>
                    <button class="btn-filter px-3 py-1 text-xs font-medium rounded-md bg-gray-100 text-gray-500 hover:bg-warm-100" data-filter="transfer">Mutasi</button>
                </div>
            </div>
            <div class="overflow-x-auto scroll-thin">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-400 border-b border-gray-100">
                            <th class="py-3 px-3 font-medium text-left">Tanggal</th>
                            <th class="py-3 px-3 font-medium text-left">Kategori</th>
                            <th class="py-3 px-3 font-medium text-left">Rekening</th>
                            <th class="py-3 px-3 font-medium text-right">Pemasukan</th>
                            <th class="py-3 px-3 font-medium text-right">Pengeluaran</th>
                            <th class="py-3 px-3 font-medium text-right">Admin</th>
                            <th class="py-3 px-3 font-medium text-left">Keterangan</th>
                            <th class="py-3 px-3 font-medium text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr><td colspan="8" class="text-center py-5 text-gray-400">Belum ada transaksi</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- Account Detail Modal -->
<div class="modal-overlay fixed inset-0 z-50 items-center justify-center bg-black/40" id="account-detail-modal" style="display:none">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 shadow-xl max-h-[85vh] overflow-y-auto scroll-thin">
        <h3 class="text-base font-bold text-gray-800 mb-4" id="account-detail-title">Detail Rekening</h3>
        <div id="account-detail-body"></div>
        <button onclick="closeAccountDetailModal()" class="w-full mt-5 py-2.5 text-sm font-medium border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-50">Tutup</button>
    </div>
</div>

<script src="/static/transactions.js"></script>
</body>
</html>
