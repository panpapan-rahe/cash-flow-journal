<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow Web - Login</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23B8860B'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white'%3E🏦%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Cashflow</h1>
        <p class="subtitle">Pencatatan keuangan personal</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            {% if user_count == 0 %}
                <p class="hint">User pertama akan otomatis dibuat sebagai akun.</p>
            {% endif %}
            <input type="hidden" name="action" id="action" value="login">
            <button type="submit" class="btn btn-primary" id="btn-login">Masuk</button>
            <button type="submit" class="btn btn-secondary" id="btn-register" onclick="document.getElementById('action').value='register';">Daftar Akun Baru</button>
        </form>
    </div>
</body>
</html>
